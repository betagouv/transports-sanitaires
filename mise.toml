[tools]
node = "24.16.0"
python = "3.13.14"

[tasks.clean-install]
description = "Installe proprement (npm ci) les dépendances du simulateur"
run = "npm --prefix {{config_root}}/apps/simulateur-eligibilite ci"

[tasks.dev-simulateur-front]
description = "Front de dev du simulateur (http://localhost:5173, proxy /api → :3000)"
dir = "{{config_root}}/apps/simulateur-eligibilite"
run = "npm run dev:front"

[tasks.dev-simulateur-server]
description = "Backend de dev du simulateur (http://localhost:3000, API référentiel + contexte)"
dir = "{{config_root}}/apps/simulateur-eligibilite"
run = "npm run dev:server"

[tasks.dev-simulateur]
description = "Simulateur : front + backend en parallèle"
depends = ["dev-simulateur-front", "dev-simulateur-server"]

[tasks.dev]
description = "Lance le simulateur (front + backend)"
depends = ["dev-simulateur"]
